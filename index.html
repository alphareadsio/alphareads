<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaReads - Financial & Self-Help Audiobooks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0A0A0F;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #F5A623 0%, #1a1a2e 100%);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 2px solid #F5A623;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #F5A623;
        }

        header p {
            font-size: 1.1em;
            color: #CCCCCC;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .book-card {
            background: #1a1a2e;
            border: 1px solid #F5A623;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(245, 166, 35, 0.2);
        }

        .book-cover {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #2a2a3e, #0A0A0F);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid #F5A623;
        }

        .book-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .book-cover-placeholder {
            font-size: 5em;
            color: #F5A623;
            opacity: 0.5;
        }

        .book-content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .book-title {
            font-size: 1.2em;
            color: #F5A623;
            margin-bottom: 6px;
            font-weight: 700;
        }

        .book-author {
            color: #AAAAAA;
            font-size: 0.9em;
            margin-bottom: 12px;
        }

        .book-description {
            color: #DDDDDD;
            font-size: 0.85em;
            margin-bottom: 20px;
            line-height: 1.5;
            flex: 1;
        }

        .audio-player {
            background: #0A0A0F;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        audio {
            width: 100%;
            height: 40px;
            accent-color: #F5A623;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 0.95em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-listen {
            background: #F5A623;
            color: #0A0A0F;
        }

        .btn-listen:hover {
            background: #E09512;
            transform: scale(1.05);
        }

        .btn-amazon {
            background: #FF9900;
            color: #000000;
        }

        .btn-amazon:hover {
            background: #E68A00;
            transform: scale(1.05);
        }

        .affiliate-disclaimer {
            text-align: center;
            color: #888888;
            font-size: 0.85em;
            margin-top: 40px;
            padding: 20px;
            border-top: 1px solid #333333;
        }
    </style>
</head>
<body>
    <header>
        <h1>📚 AlphaReads</h1>
        <p>Financial Freedom Through Audiobooks</p>
    </header>

    <div class="container">
        <div class="books-grid" id="booksGrid"></div>
        
        <div class="affiliate-disclaimer">
            <p>🤝 AlphaReads is an affiliate partner. We earn a commission when you purchase through our Amazon links at no extra cost to you.</p>
        </div>
    </div>

    <script>
        const books = [
            {
                id: 1,
                title: "The Bitcoin Standard",
                author: "Saifedean Ammous",
                description: "Understand why Bitcoin is digital money for the modern age. A deep dive into monetary history and economics.",
                audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
                amazonUrl: "https://amzn.to/4sCFJ4C",
                coverUrl: "https://covers.openlibrary.org/b/id/10407076-M.jpg"
            },
            {
                id: 2,
                title: "Rich Dad Poor Dad",
                author: "Robert Kiyosaki",
                description: "The classic guide to building wealth and financial independence through real estate and entrepreneurship.",
                audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
                amazonUrl: "https://amzn.to/4s0FBeb",
                coverUrl: "https://covers.openlibrary.org/b/id/8239141-M.jpg"
            },
            {
                id: 3,
                title: "The DeFi Revolution",
                author: "Camila Russo",
                description: "Explore decentralized finance and how blockchain is transforming traditional banking and investing.",
                audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
                amazonUrl: "https://amzn.to/4tctJqo",
                coverUrl: "https://covers.openlibrary.org/b/id/11225435-M.jpg"
            },
            {
                id: 4,
                title: "The Intelligent Investor",
                author: "Benjamin Graham",
                description: "The definitive guide to value investing. Learn the principles that made Warren Buffett a billionaire.",
                audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3",
                amazonUrl: "https://www.amazon.com/dp/0060555661?tag=alphareadsio-20",
                coverUrl: "https://covers.openlibrary.org/b/id/7742435-M.jpg"
            },
            {
                id: 5,
                title: "Atomic Habits",
                author: "James Clear",
                description: "Transform your life with tiny, incremental changes. The science of habit formation and personal growth.",
                audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3",
                amazonUrl: "https://www.amazon.com/dp/0735211299?tag=alphareadsio-20",
                coverUrl: "https://covers.openlibrary.org/b/id/8378263-M.jpg"
            },
            {
                id: 6,
                title: "The Psychology of Money",
                author: "Morgan Housel",
                description: "Learn how psychology drives financial decisions. Understand yourself and others better with money.",
                audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3",
                amazonUrl: "https://www.amazon.com/dp/0857197681?tag=alphareadsio-20",
                coverUrl: "https://covers.openlibrary.org/b/id/8394265-M.jpg"
            }
        ];

        function renderBooks() {
            const grid = document.getElementById('booksGrid');
            grid.innerHTML = books.map(book => `
                <div class="book-card">
                    <div class="book-cover">
                        <img src="${book.coverUrl}" alt="${book.title}" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=\\'book-cover-placeholder\\'>📚</div>'">
                    </div>
                    <div class="book-content">
                        <h2 class="book-title">${book.title}</h2>
                        <p class="book-author">by ${book.author}</p>
                        <p class="book-description">${book.description}</p>
                        
                        <div class="audio-player">
                            <audio controls>
                                <source src="${book.audioUrl}" type="audio/mpeg">
                                Your browser does not support the audio element.
                            </audio>
                        </div>

                        <div class="buttons">
                            <button class="btn btn-amazon" onclick="window.open('${book.amazonUrl}', '_blank')">
                                📖 Buy on Amazon
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Render on load
        renderBooks();
    </script>
</body>
</html>
