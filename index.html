<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaReads - Financial & Self-Help Audiobooks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0A0A0F;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #F5A623 0%, #1a1a2e 100%);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 2px solid #F5A623;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #F5A623;
        }

        header p {
            font-size: 1.1em;
            color: #CCCCCC;
        }

        .header-image {
            max-width: 100%;
            height: auto;
            margin-top: 20px;
            border-radius: 8px;
            max-height: 200px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .book-card {
            background: #1a1a2e;
            border: 1px solid #F5A623;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(245, 166, 35, 0.2);
        }

        .book-cover {
            width: 100%;
            height: 350px;
            background: linear-gradient(135deg, #2a2a3e, #0A0A0F);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid #F5A623;
        }

        .book-cover img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 10px;
            background: #0A0A0F;
        }

        .book-content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .book-title {
            font-size: 1.2em;
            font-weight: bold;
            color: #F5A623;
            margin-bottom: 6px;
        }

        .book-author {
            font-size: 0.95em;
            color: #AAAAAA;
            margin-bottom: 12px;
        }

        .book-description {
            font-size: 0.9em;
            color: #CCCCCC;
            margin-bottom: 16px;
            flex: 1;
        }

        .audio-player {
            margin-bottom: 16px;
        }

        audio {
            width: 100%;
            height: 40px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .btn-amazon {
            background: #F5A623;
            color: #000;
        }

        .btn-amazon:hover {
            background: #FFB84D;
            transform: scale(1.05);
        }

        footer {
            text-align: center;
            padding: 30px 20px;
            border-top: 1px solid #F5A623;
            color: #AAAAAA;
            font-size: 0.9em;
        }

        .affiliate-disclaimer {
            background: rgba(245, 166, 35, 0.1);
            border-left: 3px solid #F5A623;
            padding: 15px;
            margin: 30px 0;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <header>
        <h1>📚 AlphaReads</h1>
        <p>Financial Freedom Through Knowledge</p>
    </header>

    <div class="container">
        <div class="affiliate-disclaimer">
            <strong>🤝 AlphaReads Affiliate Partnership</strong><br>
            We earn a commission when you purchase through our Amazon links at no extra cost to you.
        </div>

        <div id="booksGrid" class="books-grid"></div>
    </div>

    <footer>
        <p>&copy; 2026 AlphaReads. All rights reserved. | <a href="#" style="color: #F5A623;">Privacy Policy</a></p>
    </footer>

    <script>
        const books = [
            {
                id: 1,
                title: "The Bitcoin Standard",
                author: "Saifedean Ammous",
                description: "A comprehensive look at Bitcoin's economic principles and how it challenges traditional currency systems.",
                audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
                amazonUrl: "https://amzn.to/4sCFJ4C",
                coverUrl: "https://images-na.ssl-images-amazon.com/images/P/B07BV464TC.01.L.jpg"
            },
            {
                id: 2,
                title: "Rich Dad Poor Dad",
                author: "Robert Kiyosaki",
                description: "The classic guide to building wealth and financial independence through real estate and entrepreneurship.",
                audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
                amazonUrl: "https://amzn.to/4s0FBeb",
                coverUrl: "https://images-na.ssl-images-amazon.com/images/P/1612680012.01.L.jpg"
            },
            {
                id: 3,
                title: "The DeFi Revolution",
                author: "Camila Russo",
                description: "Explore decentralized finance and how blockchain is transforming traditional banking and investing.",
                audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
                amazonUrl: "https://amzn.to/4tctJqo",
                coverUrl: "https://images-na.ssl-images-amazon.com/images/P/B0B4J7QDJM.01.L.jpg"
            },
            {
                id: 4,
                title: "Atomic Habits",
                author: "James Clear",
                description: "Transform your life with tiny, incremental changes. The science of habit formation and personal growth.",
                audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3",
                amazonUrl: "https://www.amazon.com/dp/0735211299?tag=alphareadsio-20",
                coverUrl: "https://images-na.ssl-images-amazon.com/images/P/0735211299.01.L.jpg"
            },
            {
                id: 5,
                title: "The Intelligent Investor",
                author: "Benjamin Graham",
                description: "The definitive guide to value investing. Learn the principles that made Warren Buffett a billionaire.",
                audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3",
                amazonUrl: "https://www.amazon.com/dp/0060555661?tag=alphareadsio-20",
                coverUrl: "https://images-na.ssl-images-amazon.com/images/P/0060555661.01.L.jpg"
            },
            {
                id: 6,
                title: "The Psychology of Money",
                author: "Morgan Housel",
                description: "Learn how psychology drives financial decisions. Understand yourself and others better with money.",
                audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3",
                amazonUrl: "https://www.amazon.com/dp/0857197681?tag=alphareadsio-20",
                coverUrl: "https://images-na.ssl-images-amazon.com/images/P/0857197681.01.L.jpg"
            }
        ];

        function renderBooks() {
            const grid = document.getElementById('booksGrid');
            grid.innerHTML = books.map(book => `
                <div class="book-card">
                    <div class="book-cover">
                        <img src="${book.coverUrl}" alt="${book.title}" loading="lazy">
                    </div>
                    <div class="book-content">
                        <h2 class="book-title">${book.title}</h2>
                        <p class="book-author">by ${book.author}</p>
                        <p class="book-description">${book.description}</p>
                        
                        <div class="audio-player">
                            <audio controls>
                                <source src="${book.audioUrl}" type="audio/mpeg">
                                Your browser does not support the audio element.
                            </audio>
                        </div>

                        <div class="buttons">
                            <button class="btn btn-amazon" onclick="window.open('${book.amazonUrl}', '_blank')">
                                📖 Buy on Amazon
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Render on load
        document.addEventListener('DOMContentLoaded', renderBooks);
    </script>
</body>
</html>
