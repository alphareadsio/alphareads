<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlphaReads - Financial & Self-Help Audiobooks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0A0A0F;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            line-height: 1.6;
        }

        header {
            background: #000000;
            padding: 15px 20px;
            text-align: center;
            border-bottom: 2px solid #333333;
        }

        .header-logo {
            width: 100%;
            max-height: 259px;
            object-fit: contain;
            margin: 0 auto 10px auto;
            display: block;
        }

        header h1 {
            font-size: 1.8em;
            margin-bottom: 5px;
            color: #1A8FE3;
        }

        header p {
            font-size: 0.95em;
            color: #CCCCCC;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }

        .book-card {
            background: #1a1a2e;
            border: 1px solid #333333;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            display: flex;
            flex-direction: column;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(50, 50, 50, 0.5);
        }

        .book-cover {
            width: 100%;
            height: 350px;
            background: #0A0A0F;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-bottom: 1px solid #333333;
        }

        .book-cover img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 10px;
        }

        .book-content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .book-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
            color: #1A8FE3;
        }

        .book-author {
            font-size: 0.9em;
            color: #AAAAAA;
            margin-bottom: 10px;
        }

        .book-description {
            font-size: 0.85em;
            color: #DDDDDD;
            flex: 1;
            margin-bottom: 15px;
        }

        .audio-player {
            margin-bottom: 15px;
        }

        audio {
            width: 100%;
            height: 30px;
        }

        .buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 6px;
            font-size: 0.9em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-read-more {
            background: #2a2a2a;
            color: #FFFFFF;
            border: 1px solid #444444;
        }

        .btn-read-more:hover {
            background: #3a3a3a;
            transform: scale(1.05);
        }

        .btn-amazon {
            background: #2a2a2a;
            color: #FFFFFF;
            border: 1px solid #444444;
        }

        .btn-amazon:hover {
            background: #3a3a3a;
            transform: scale(1.05);
        }

        footer {
            background: #1a1a2e;
            padding: 20px;
            text-align: center;
            color: #AAAAAA;
            border-top: 1px solid #333333;
            margin-top: 40px;
        }

        footer a {
            color: #1A8FE3;
            text-decoration: none;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .books-grid {
                grid-template-columns: 1fr;
            }

            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header>
        <img src="https://pbs.twimg.com/profile_banners/2037565239206555648/1774634144/1500x500" alt="AlphaReads" class="header-logo">
        <h1>🎙️ AlphaReads</h1>
        <p>Financial &amp; Self-Help Audiobooks</p>
        <p style="font-size: 0.9em; margin-top: 10px; color: #AAAAAA;">📚 Listen to summaries | 📈 Build wealth | 💡 Learn better</p>
    </header>

    <div class="container">
        <p style="text-align: center; color: #AAAAAA; margin-bottom: 30px;">
            🤝 <strong>Affiliate Partnership</strong> — We earn a commission when you purchase through our Amazon links at no extra cost to you.
        </p>

        <div class="books-grid" id="booksContainer"></div>
    </div>

    <footer>
        <p>&copy; 2026 AlphaReads. All rights reserved. | <a href="/sitemap.xml">Sitemap</a></p>
    </footer>

    <script>
        const books = [
            {
                id: 1,
                title: "Atomic Habits",
                author: "James Clear",
                description: "Transform your life with tiny changes. Learn how small habits compound into remarkable results.",
                coverUrl: "https://images-na.ssl-images-amazon.com/images/P/0735211299.01.L.jpg",
                audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
                amazonUrl: "https://amzn.to/4sCFJ4C"
            },
            {
                id: 2,
                title: "Rich Dad Poor Dad",
                author: "Robert T. Kiyosaki",
                description: "Discover the mindset differences between wealthy and poor people. Learn how to build real wealth.",
                coverUrl: "https://images-na.ssl-images-amazon.com/images/P/B00JPKYMRI.01.L.jpg",
                audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3",
                amazonUrl: "https://amzn.to/4s0FBeb"
            },
            {
                id: 3,
                title: "The Bitcoin Standard",
                author: "Saifedean Ammous",
                description: "Understand sound money and the economics of Bitcoin. A must-read for any investor.",
                coverUrl: "https://images-na.ssl-images-amazon.com/images/P/1119473861.01.L.jpg",
                audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3",
                amazonUrl: "https://amzn.to/4sCFJ4C"
            },
            {
                id: 4,
                title: "The Intelligent Investor",
                author: "Benjamin Graham",
                description: "The bible of value investing. Learn timeless principles for building a successful investment portfolio.",
                coverUrl: "https://images-na.ssl-images-amazon.com/images/P/0060555661.01.L.jpg",
                audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3",
                amazonUrl: "https://amzn.to/4tctJqo"
            },
            {
                id: 5,
                title: "The Psychology of Money",
                author: "Morgan Housel",
                description: "How to think about money differently. Master the behavioral side of investing and personal finance.",
                coverUrl: "https://images-na.ssl-images-amazon.com/images/P/B0BFNKWXCC.01.L.jpg",
                audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3",
                amazonUrl: "https://amzn.to/4tctJqo"
            },
            {
                id: 6,
                title: "The DeFi Revolution",
                author: "Farokh Sarmad",
                description: "The future of finance is here. Learn how decentralized finance is transforming the financial landscape.",
                coverUrl: "https://images-na.ssl-images-amazon.com/images/P/B0D4MZXY3S.01.L.jpg",
                audioUrl: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3",
                amazonUrl: "https://amzn.to/4tctJqo"
            }
        ];

        function renderBooks() {
            const container = document.getElementById('booksContainer');
            container.innerHTML = books.map(book => `
                <div class="book-card">
                    <div class="book-cover">
                        <img src="${book.coverUrl}" alt="${book.title}" onerror="this.src='https://via.placeholder.com/200x300?text=${encodeURIComponent(book.title)}'">
                    </div>
                    <div class="book-content">
                        <h2 class="book-title">${book.title}</h2>
                        <p class="book-author">by ${book.author}</p>
                        <p class="book-description">${book.description}</p>
                        <div class="audio-player">
                            <audio controls>
                                <source src="${book.audioUrl}" type="audio/mpeg">
                                Your browser does not support the audio element.
                            </audio>
                        </div>
                        <div class="buttons">
                            <button class="btn btn-read-more" onclick="goToBook(${book.id})">
                                📖 Read More
                            </button>
                            <button class="btn btn-amazon" onclick="window.open('${book.amazonUrl}', '_blank')">
                                💳 $0.00 With Free Trial
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function goToBook(bookId) {
            window.location.href = `book.html?id=${bookId}`;
        }

        document.addEventListener('DOMContentLoaded', renderBooks);
    </script>
</body>
</html>
